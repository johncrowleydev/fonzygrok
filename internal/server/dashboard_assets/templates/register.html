{{define "content"}}
<div class="auth-page">
    <div class="auth-box">
        <div class="auth-logo">
            <h1>fonzygrok</h1>
            <p>Create your account</p>
        </div>
        <div class="card">
            {{if .Error}}
            <div class="flash flash-error">✘ {{.Error}}</div>
            {{end}}
            <form method="POST" action="/register">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="john_doe"
                           required value="{{.FormUsername}}" pattern="[a-zA-Z0-9_-]{3,32}">
                    <p class="pw-hint">3–32 characters, alphanumeric, underscores, hyphens</p>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com"
                           required value="{{.FormEmail}}">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                           required minlength="8">
                    <p class="pw-hint">Minimum 8 characters</p>
                </div>
                <div class="form-group">
                    <label for="invite_code">Invite Code</label>
                    <input type="text" id="invite_code" name="invite_code" placeholder="ABCD1234"
                           required value="{{.FormInviteCode}}" style="font-family:var(--mono);text-transform:uppercase">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
                    Create Account
                </button>
            </form>
        </div>
        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
{{end}}
