# ============================================================================
# TAG_TAXONOMY.yaml — Controlled Vocabulary for Document Tags
# ============================================================================
#
# PURPOSE: Prevents tag sprawl. All tags used in doc frontmatter MUST exist
# in this file. If a new tag is needed, add it here FIRST with a description.
#
# RULES:
#   1. Use lowercase, hyphenated tags (e.g., "root-cause" not "RootCause")
#   2. Check for existing synonyms before adding a new tag
#   3. Each tag must have a description
#   4. Group tags by domain for human readability
# ============================================================================

schema_version: "1.0.0"

# ── Lifecycle & Status ────────────────────────────────────────────────────────
lifecycle:
  - tag: active
    description: "Currently in use and maintained"
  - tag: deprecated
    description: "Superseded or no longer relevant"
  - tag: draft
    description: "Work in progress, not yet reviewed"

# ── Documentation ─────────────────────────────────────────────────────────────
documentation:
  - tag: documentation
    description: "Documentation processes, doc management, doc generation"
  - tag: standards
    description: "Coding standards, naming conventions, formatting rules"
  - tag: naming
    description: "Naming conventions for files, folders, variables"
  - tag: frontmatter
    description: "YAML frontmatter schema and requirements"
  - tag: templates
    description: "Document templates and scaffolding"
  - tag: index
    description: "Navigation, entry points, master indexes"
  - tag: entry-point
    description: "Starting point for humans or agents"
  - tag: navigation
    description: "Navigation aids, wayfinding, document discovery"
  - tag: codex
    description: "CODEX documentation system — structure, areas, discovery mechanisms"

# ── Architecture ──────────────────────────────────────────────────────────────
