services:
  postgres:
    image: postgres:16-alpine
    container_name: fonzygrok-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fonzygrok}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fonzygrok}
      - POSTGRES_DB=${POSTGRES_DB:-fonzygrok}
    volumes:
      - fonzygrok-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fonzygrok"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  fonzygrok-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: fonzygrok-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SSH_PORT:-2222}:2222"
      - "80:80"              # HTTP→HTTPS redirect server
      - "8080:8080"          # HTTP edge (non-TLS fallback)
      - "${HTTPS_PORT:-443}:443"
      # TCP tunnel port range — keep narrow to limit attack surface.
      - "${TCP_PORT_RANGE:-40000-40100}:40000-40100"
      # Port 9090 is optional for external access — dashboard is served on :443
      # when TLS is enabled. Uncomment for direct admin API access.
      # - "${ADMIN_PORT:-9090}:9090"
    volumes:
      - fonzygrok-data:/data
      - fonzygrok-certs:/data/certs
    environment:
      - DOMAIN=${DOMAIN:-tunnel.localhost}
      - APEX_DOMAIN=${APEX_DOMAIN:-}
      - TLS_ENABLED=${TLS_ENABLED:-false}
      - TCP_PORT_RANGE=${TCP_PORT_RANGE:-40000-40100}
      - RATE_LIMIT=${RATE_LIMIT:-100}
      - RATE_BURST=${RATE_BURST:-200}
      - DATABASE_URL=postgres://${POSTGRES_USER:-fonzygrok}:${POSTGRES_PASSWORD:-fonzygrok}@postgres:5432/${POSTGRES_DB:-fonzygrok}?sslmode=disable
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: []
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  fonzygrok-pgdata:
    driver: local
  fonzygrok-data:
    driver: local
  fonzygrok-certs:
    driver: local
